<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Hayahide Counter</title>
<style>
  /* ================================================================
     Hayahide Counter — 日次カウンター記録ページ（スマホ用・GitHub同期）
     秘密情報は一切含まない。実データはPrivateの Hayahide-Log に保存。
     トークンは各端末のブラウザ内(localStorage)のみに保存される。
     ================================================================ */
  :root {
    --page: #0c0a11; --surface: #16131d; --surface-2: #1d1926;
    --ink: #f2f0f7; --ink-2: #b8b3c7; --muted: #7d7890;
    --grid: #2a2536; --border: rgba(158,140,255,0.14);
    --accent: #9085e9; --accent-hi: #b5aaff; --accent-deep: #5b4bc4;
    --accent-soft: rgba(144,133,233,0.10); --good: #34c85a; --bad: #e66767;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html { color-scheme: dark; }
  body {
    background:
      radial-gradient(900px 460px at 80% -10%, rgba(120,90,240,0.16), transparent 60%),
      var(--page);
    color: var(--ink);
    font-family: system-ui, -apple-system, "Segoe UI", "Hiragino Sans", "Yu Gothic UI", sans-serif;
    line-height: 1.6; padding: max(20px, env(safe-area-inset-top)) 16px 48px; min-height: 100vh;
  }
  .wrap { max-width: 720px; margin: 0 auto; }
  header { margin-bottom: 20px; }
  h1 {
    font-size: 22px; font-weight: 700;
    background: linear-gradient(90deg, var(--ink), var(--accent-hi));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .sub { color: var(--muted); font-size: 12px; }

  .card { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
  .sync-head { display: flex; align-items: center; justify-content: space-between; gap: 10px; flex-wrap: wrap; }
  .gh-status { font-size: 12px; color: var(--muted); }
  .linkbtn { font-family: inherit; font-size: 13px; cursor: pointer; background: none; border: none; color: var(--accent-hi); text-decoration: underline; text-underline-offset: 3px; padding: 6px 2px; }
  .linkbtn.danger { color: var(--bad); }
  .btn { font-family: inherit; font-weight: 700; cursor: pointer; color: #fff; border: none; border-radius: 999px; padding: 9px 16px; background: linear-gradient(90deg, var(--accent-deep), var(--accent)); }

  .sync-cfg { display: none; margin-top: 14px; }
  .sync-cfg.open { display: block; }
  .sync-cfg label { font-size: 12px; color: var(--ink-2); display: block; margin-bottom: 10px; }
  .cfg-grid { display: grid; gap: 8px; }
  .sync-cfg input { width: 100%; font-family: inherit; font-size: 16px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--border); border-radius: 10px; padding: 11px 12px; }
  .sync-cfg input:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .cfg-actions { display: flex; align-items: center; gap: 14px; margin-top: 12px; flex-wrap: wrap; }

  .counter { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 18px; margin-bottom: 16px; }
  .chead { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
  .cemoji { font-size: 24px; }
  .cname { font-size: 16px; font-weight: 700; }
  .cgoal { font-size: 11px; color: var(--muted); margin-left: auto; }
  .cbig { display: flex; align-items: baseline; gap: 8px; margin-bottom: 12px; }
  .cval { font-size: 34px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .cunit { font-size: 13px; color: var(--muted); }
  .cbtns { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .brk { flex-basis: 100%; height: 0; margin: 0; } /* flex-wrap内で強制改行するスペーサー */
  .cbtn { cursor: pointer; font-family: inherit; font-size: 15px; font-weight: 700; line-height: 1; border: 1px solid var(--border); border-radius: 11px; background: var(--surface-2); color: var(--ink); padding: 12px 14px; }
  .cbtn.rec { background: linear-gradient(135deg, var(--accent-deep), var(--accent)); color: #fff; border: none; }
  .cbtn.rec.arming { background: linear-gradient(135deg, #b06a12, #e0902a); } /* 誤タップ防止の確認状態 */
  .cbtn.undo { color: var(--muted); font-size: 13px; font-weight: 600; }
  .cbtn.sel { background: linear-gradient(135deg, var(--accent-deep), var(--accent)); color: #fff; border-color: transparent; }
  .crow { flex: 1 0 100%; display: flex; gap: 8px; align-items: center; }
  .rlabel { font-size: 12px; color: var(--muted); min-width: 3.4em; flex: none; }
  .memo { flex: 1; min-width: 0; font-family: inherit; font-size: 15px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--border); border-radius: 11px; padding: 11px 13px; }
  .memo:focus { outline: 2px solid var(--accent); border-color: transparent; }
  .rsuffix { font-size: 13px; color: var(--muted); flex: none; }
  .rcheck { display: inline-flex; align-items: center; gap: 6px; font-size: 15px; color: var(--ink); background: var(--surface-2); border: 1px solid var(--border); border-radius: 10px; padding: 8px 11px; }
  .rcheck input { width: 18px; height: 18px; accent-color: var(--accent); }
  /* 履歴（記録の一覧・編集/削除） */
  .hist { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--grid); max-height: 340px; overflow-y: auto; }
  .hist.open { display: block; }
  .hrow { display: flex; align-items: center; gap: 8px; padding: 8px 0; border-bottom: 1px solid var(--grid); font-size: 12.5px; }
  .htime { color: var(--muted); flex: none; min-width: 5.6em; }
  .hsum { flex: 1; color: var(--ink-2); word-break: break-word; }
  .hact { flex: none; display: flex; gap: 6px; }
  .hbtn { font-size: 12px; font-weight: 600; padding: 7px 11px; }
  .hempty { color: var(--muted); font-size: 12px; padding: 4px 0; }
  /* 今日1日のグラフ */
  .daygraph-wrap { margin-top: 10px; background: var(--surface-2); border: 1px solid var(--border); border-radius: 12px; padding: 8px 10px 4px; }
  .daygraph { width: 100%; height: auto; display: block; }
  .dglegend { font-size: 10.5px; color: var(--muted); text-align: right; margin-top: 2px; }
  .dgtitle { font-size: 11.5px; font-weight: 700; color: var(--ink-2); margin-bottom: 3px; }
  .cbtn:active { transform: scale(0.95); }
  .cstats { font-size: 12.5px; color: var(--ink-2); margin-top: 12px; }
  .cstats b { color: var(--ink); font-weight: 700; }
  .clast { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .retro { display: none; margin-top: 12px; padding-top: 12px; border-top: 1px solid var(--grid); }
  .retro.open { display: block; }
  .retro label { font-size: 11px; color: var(--muted); display: block; margin-bottom: 8px; }
  .rrow { display: flex; flex-wrap: wrap; gap: 8px; align-items: center; }
  .retro input, .retro select { font-family: inherit; font-size: 16px; background: var(--surface-2); color: var(--ink); border: 1px solid var(--border); border-radius: 10px; padding: 12px 12px; color-scheme: dark; }
  /* 入力欄が潰れて1文字幅にならないよう最小幅を確保し、狭い画面では折り返して大きく表示する */
  .rrow input, .rrow select { flex: 1 1 8.5em; min-width: 8em; }
  .rrow input[type="datetime-local"] { flex: 1 1 11em; min-width: 10.5em; }

  footer { color: var(--muted); font-size: 11px; text-align: center; margin-top: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <h1>Hayahide Counter</h1>
    <div class="sub">日次カウンター — 記録は端末に保存し GitHub で同期</div>
  </header>

  <!-- 同期 -->
  <div class="card">
    <div class="sync-head">
      <span id="gh-status" class="gh-status"></span>
      <span>
        <button class="linkbtn" id="gh-sync" type="button">🔄 同期</button>
        <button class="linkbtn" id="gh-config" type="button">⚙️ 設定</button>
      </span>
    </div>
    <div class="sync-cfg" id="gh-cfg-panel">
      <label>GitHub Private リポジトリに記録を同期します（各端末で1回設定）。Fine-grained トークンは対象リポジトリのみ・Contents読み書きで発行してください。</label>
      <div class="cfg-grid">
        <input id="cfg-owner" placeholder="owner（例: hayahide-cloud）" autocapitalize="off" autocorrect="off">
        <input id="cfg-repo" placeholder="repo（例: Hayahide-Log）" autocapitalize="off" autocorrect="off">
        <input id="cfg-path" placeholder="path（例: counters.json）" value="counters.json" autocapitalize="off" autocorrect="off">
        <input id="cfg-branch" placeholder="branch（例: main）" value="main" autocapitalize="off" autocorrect="off">
        <input id="cfg-token" type="password" placeholder="Fine-grained token（github_pat_...）" autocapitalize="off" autocorrect="off">
      </div>
      <div class="cfg-actions">
        <button class="btn" id="cfg-save" type="button">保存して同期</button>
        <button class="linkbtn danger" id="cfg-clear" type="button">この端末の設定を削除</button>
      </div>
    </div>
  </div>

  <div id="counters"></div>
  <footer>Hayahide Counter — トークンとデータはこの公開ページには含まれません</footer>
</div>

<script>
/* カウンター定義。type: count=回数のみ / rated=★5評価 / rated2=量★5+質★5評価 / mood=感情値(遡及なし) */
const COUNTERS = [
  { key: "mood",  name: "Mood", emoji: "🙂", type: "mood",  unit: "" },
  { key: "water", name: "Water", emoji: "🥤", type: "water", unit: "回" },
  { key: "meal",  name: "Meal", emoji: "🍽️", type: "rated2", unit: "回", content: true, price: true, place: true, who: true },
  { key: "toilet", name: "Restroom", emoji: "🚽", type: "rated2", unit: "回", checks: [{ k: "small", label: "小" }, { k: "large", label: "大" }] },
  { key: "ejac",  name: "Release",  emoji: "💧", type: "rated2", unit: "回", sex: true, memo: true },
  { key: "ibuprofen", name: "Ibuprofen", emoji: "💊", type: "dose", unit: "回", dose: 150, doseUnit: "mg", reasonDefault: "頭痛" },
  { key: "cepharanthin", name: "セファランチン", emoji: "💊", type: "count", unit: "錠", perDay: 3, sched: "朝・昼・晩" },
  { key: "epinastine", name: "エピナスチン", emoji: "💊", type: "count", unit: "錠", perDay: 1, sched: "晩のみ" },
  { key: "betamethasone", name: "ベタメタゾンローション", emoji: "🧴", type: "count", unit: "回", perDay: 2, sched: "朝・晩" },
  { key: "smoke", name: "Smoke",  emoji: "🚬", type: "count", unit: "本", goal: "Reduce", confirm: true },
];
const MOODS = [{ v: 1, e: "😣" }, { v: 2, e: "😕" }, { v: 3, e: "😐" }, { v: 4, e: "🙂" }, { v: 5, e: "😄" }];

const KEY = "hayahide_events_v1", DEL_KEY = "hayahide_events_deleted_v1", CFG_KEY = "hayahide_gh_cfg";
// 進行中フラグ（水の飲み始め〜飲み終わり等）。この端末ローカルのみで保持し同期しない
const PEND_KEY = "hayahide_pending_v1";
function getPending() { try { return JSON.parse(localStorage.getItem(PEND_KEY)) || {}; } catch (e) { return {}; } }
function setPending(key, val) { const p = getPending(); if (val) p[key] = val; else delete p[key]; localStorage.setItem(PEND_KEY, JSON.stringify(p)); }
const box = document.getElementById("counters");
const statusEl = document.getElementById("gh-status");
const panel = document.getElementById("gh-cfg-panel");

// メモ（オカズ）は自由入力なのでHTMLエスケープしてから表示する
function esc(s) { return String(s).replace(/[&<>"']/g, c => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c])); }
function all() { try { return JSON.parse(localStorage.getItem(KEY)) || {}; } catch (e) { return {}; } }
function save(d) { localStorage.setItem(KEY, JSON.stringify(d)); }
function events(k) { return all()[k] || []; }
function deleted() { try { return JSON.parse(localStorage.getItem(DEL_KEY)) || []; } catch (e) { return []; } }
function saveDeleted(a) { localStorage.setItem(DEL_KEY, JSON.stringify(a)); }
function newId() { return (self.crypto && crypto.randomUUID) ? crypto.randomUUID() : "e" + Date.now() + Math.random().toString(36).slice(2); }

function dstr(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
function isToday(ts) { return dstr(new Date(ts)) === dstr(new Date()); }
function sinceDays(n) { const d = new Date(); d.setDate(d.getDate() - n + 1); d.setHours(0, 0, 0, 0); return d.getTime(); }
function countDays(k, n) { const f = sinceDays(n); return events(k).filter(e => new Date(e.ts).getTime() >= f).length; }
function todayEvents(k) { return events(k).filter(e => isToday(e.ts)); }
function fmtTime(ts) { const d = new Date(ts); return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0"); }
function avgRating(k, n, field) { field = field || "rating"; const f = sinceDays(n); const rs = events(k).filter(e => new Date(e.ts).getTime() >= f && e[field]).map(e => e[field]); return rs.length ? rs.reduce((s, r) => s + r, 0) / rs.length : 0; }
function todayMood(k) { const ms = todayEvents(k).filter(e => e.mood).map(e => e.mood); return ms.length ? ms[ms.length - 1] : 0; }
function nowLocalInput() { const d = new Date(); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); return d.toISOString().slice(0, 16); }

// mt=更新時刻(ms)。同期マージで新しい編集が古いリモート版に上書きされないための版管理
function record(key, extra, tsIso) {
  const d = all(); d[key] = d[key] || [];
  d[key].push(Object.assign({ id: newId(), ts: tsIso || new Date().toISOString(), mt: Date.now() }, extra || {}));
  d[key].sort((a, b) => a.ts.localeCompare(b.ts));
  save(d); render(); scheduleSync();
}
// トイレ記録。大は便座で必ず小も出るため、大の記録時に小（量2・質2）を副次的に自動追加する
function recordToilet(key, amount, quality, small, large, tsIso) {
  if (large) {
    record(key, { amount, quality, small: false, large: true }, tsIso);       // 大（入力値）
    record(key, { amount: 2, quality: 2, small: true, large: false }, tsIso);  // 大に伴う小（副次・固定値）
  } else {
    record(key, { amount, quality, small: true, large: false }, tsIso);        // 小のみ
  }
}
// 記録1件の値を上書き更新（idは保持、mtを更新）。tsIso 未指定なら元のtsを維持
function updateEvent(key, id, extra, tsIso) {
  const d = all(); const arr = d[key] || [];
  const i = arr.findIndex(e => e.id === id);
  if (i < 0) return;
  arr[i] = Object.assign({ id, ts: tsIso || arr[i].ts, mt: Date.now() }, extra || {});
  arr.sort((a, b) => a.ts.localeCompare(b.ts));
  save(d); render(); scheduleSync();
}
// 記録1件を削除（墓標を残して端末間に伝播）
function deleteEvent(key, id) {
  const d = all(); const arr = d[key] || [];
  const i = arr.findIndex(e => e.id === id);
  if (i < 0) return;
  arr.splice(i, 1);
  const del = deleted(); del.push(id); saveDeleted(del);
  save(d); render(); scheduleSync();
}

let editing = null; // 編集中の記録 { key, id }。null=通常記録モード

// 履歴表示用の日時（M/D HH:MM）
function mdhm(ts) { const d = new Date(ts); return (d.getMonth() + 1) + "/" + d.getDate() + " " + String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0"); }
// 記録1件の値を短く要約（履歴一覧用。表示時に esc() でエスケープする前提）
function summ(e) {
  const p = [];
  if (e.mood) p.push(e.mood + "/5");
  if (e.amount) p.push("量★" + e.amount + "・質★" + (e.quality || "-"));
  if (e.small || e.large) p.push([e.small ? "小" : "", e.large ? "大" : ""].filter(Boolean).join("・"));
  if (e.sex != null) p.push(e.sex ? "接触あり" : "接触なし");
  if (e.content) p.push("内容:" + e.content);
  if (e.price != null) p.push(e.price + "円");
  if (e.place) p.push("場所:" + e.place);
  if (e.who) p.push("誰と:" + e.who);
  if (e.memo) p.push("視覚資料:" + e.memo);
  if (e.ml != null) p.push(e.ml + "mL");
  if (e.mg != null) p.push(e.mg + "mg");
  if (e.reason) p.push(e.reason);
  if (e.rating) p.push("★" + e.rating);
  return p.join(" ／ ") || "記録";
}

// 1日のグラフ用: 折れ線＋点（hollow=true で中抜き点） / 点のみ
function dgLine(pts, color, hollow) {
  if (!pts.length) return "";
  const path = pts.map((p, i) => (i ? "L" : "M") + p.x.toFixed(1) + " " + p.y.toFixed(1)).join(" ");
  const dots = pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.4" fill="${hollow ? "none" : color}"${hollow ? ` stroke="${color}" stroke-width="1.5"` : ""}/>`).join("");
  return `<path d="${path}" fill="none" stroke="${color}" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>${dots}`;
}
// filled=true で塗りつぶし点、false で中抜き点（線でつながない＝独立イベント向け）
function dgDots(pts, color, filled) {
  return pts.map(p => `<circle cx="${p.x.toFixed(1)}" cy="${p.y.toFixed(1)}" r="2.6" fill="${filled ? color : "none"}"${filled ? "" : ` stroke="${color}" stroke-width="1.5"`}/>`).join("");
}
// 1日グラフのSVG本体。横軸=時刻(0-24h)、縦軸=1〜5評価（count型は記録時刻の縦線）
function dayGraphSvg(evs, type) {
  evs = evs.slice().sort((a, b) => a.ts.localeCompare(b.ts));
  const W = 300, H = 56, padL = 6, padR = 6, padT = 5, padB = 13;
  const plotW = W - padL - padR, plotH = H - padT - padB;
  const xOf = ts => { const d = new Date(ts); return padL + (d.getHours() + d.getMinutes() / 60) / 24 * plotW; };
  const yOf = v => padT + (1 - (v - 1) / 4) * plotH; // 1..5 を 下..上 に
  let grid = "";
  // 1時間おきにグリッド線。6時間ごと（0/6/12/18/24）は濃く＋数字ラベルを表示
  for (let h = 0; h <= 24; h++) {
    const x = padL + h / 24 * plotW, major = h % 6 === 0;
    grid += `<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${(padT + plotH).toFixed(1)}" stroke="var(--grid)" stroke-width="1" opacity="${major ? 1 : 0.4}"/>`;
    if (major) grid += `<text x="${x.toFixed(1)}" y="${H - 3}" fill="var(--muted)" font-size="8" text-anchor="middle">${h}</text>`;
  }
  const isValue = (type === "mood" || type === "rated2" || type === "rated2line" || type === "rated");
  const neutral = isValue ? `<line x1="${padL}" y1="${yOf(3).toFixed(1)}" x2="${padL + plotW}" y2="${yOf(3).toFixed(1)}" stroke="var(--grid)" stroke-width="1" stroke-dasharray="3 3"/>` : "";
  let series = "";
  if (!evs.length) {
    series = `<text x="${W / 2}" y="${(padT + plotH / 2 + 3).toFixed(1)}" fill="var(--muted)" font-size="10" text-anchor="middle">本日の記録なし</text>`;
  } else if (type === "mood") {
    series = dgLine(evs.filter(e => e.mood).map(e => ({ x: xOf(e.ts), y: yOf(e.mood) })), "var(--accent-hi)");
  } else if (type === "rated2" || type === "rated2line") {
    // 量・質とも折れ線でつなぐ（順序を追いやすく）。量=塗り点、質=中抜き点で区別
    series = dgLine(evs.filter(e => e.amount).map(e => ({ x: xOf(e.ts), y: yOf(e.amount) })), "var(--accent)")
      + dgLine(evs.filter(e => e.quality).map(e => ({ x: xOf(e.ts), y: yOf(e.quality) })), "var(--good)", true);
  } else if (type === "rated") {
    series = dgLine(evs.filter(e => e.rating).map(e => ({ x: xOf(e.ts), y: yOf(e.rating) })), "var(--accent)");
  } else if (type === "water") { // 各回の飲水量(mL)を点で。基準は1000mL（超える日はその日の最大に合わせる）
    const maxMl = Math.max(1000, ...evs.map(e => e.ml || 0));
    series = dgDots(evs.filter(e => e.ml).map(e => ({ x: xOf(e.ts), y: padT + (1 - e.ml / maxMl) * plotH })), "var(--accent)", true);
  } else { // count/dose型（喫煙・服薬など）は記録時刻に縦線
    series = evs.map(e => { const x = xOf(e.ts); return `<line x1="${x.toFixed(1)}" y1="${padT}" x2="${x.toFixed(1)}" y2="${(padT + plotH).toFixed(1)}" stroke="var(--accent)" stroke-width="2"/>`; }).join("");
  }
  return `<svg class="daygraph" viewBox="0 0 ${W} ${H}" role="img" aria-label="今日1日のグラフ">${grid}${neutral}${series}</svg>`;
}
const DG_LEGEND = `<div class="dglegend"><b style="color:var(--accent)">●</b> 量　<b style="color:var(--good)">○</b> 質</div>`;
// 今日1日のグラフ。checks:true（トイレ小・大）は区分ごとに分けて表示する（混ぜると意味がないため）
function dayGraph(c) {
  if (c.checks) {
    return c.checks.map(ch =>
      `<div class="daygraph-wrap"><div class="dgtitle">${ch.label}</div>${dayGraphSvg(todayEvents(c.key).filter(e => e[ch.k]), "rated2line")}${DG_LEGEND}</div>`
    ).join("");
  }
  return `<div class="daygraph-wrap">${dayGraphSvg(todayEvents(c.key), c.type)}${c.type === "rated2" ? DG_LEGEND : ""}</div>`;
}

function cardHtml(c) {
  const today = todayEvents(c.key);
  const last = today.length ? today[today.length - 1] : null;
  const w = countDays(c.key, 7), m = countDays(c.key, 30);
  const unit = c.unit || "回";
  let btns = "", stats = "", retroExtra = "", bigval = today.length, biglabel = "今日 " + unit, retro = true;

  if (c.type === "mood") {
    const cur = todayMood(c.key);
    bigval = cur ? (MOODS.find(x => x.v === cur) || {}).e : "—";
    biglabel = cur ? "今の気分（" + cur + "/5）" : "未記録";
    // 気分を選んでから「＋記録」で確定する（誤タップでの記録を防ぐ）。初期選択なし
    // 絵文字の選択列と操作ボタン列を .brk（全幅スペーサー）で改行して分ける
    btns = MOODS.map(x => `<button class="cbtn" data-k="${c.key}" data-moodsel="${x.v}">${x.e}</button>`).join("")
      + `<div class="brk"></div>`
      + `<button class="cbtn rec" data-k="${c.key}" data-recmood="1">＋ 記録</button>`;
    stats = `今日 <b>${today.length}</b>回記録 ／ 直近7日 <b>${w}</b>回`;
    // 遡って記録・編集用の気分セレクタ
    retroExtra = `<select data-retro-moodsel><option value="" selected>気分 未選択</option>${MOODS.map(x => `<option value="${x.v}">${x.e} ${x.v}/5</option>`).join("")}</select>`;
  } else if (c.type === "rated") {
    btns = [1, 2, 3, 4, 5].map(v => `<button class="cbtn" data-k="${c.key}" data-rating="${v}">★${v}</button>`).join("");
    const avg = avgRating(c.key, 30);
    stats = `直近7日 <b>${w}</b>${unit} ／ 30日 <b>${m}</b>${unit}${avg ? ` ／ 平均 <b>★${avg.toFixed(1)}</b>` : ""}`;
    retroExtra = `<select data-retro-rating>${[5, 4, 3, 2, 1].map(v => `<option value="${v}">★${v}</option>`).join("")}</select>`;
  } else if (c.type === "rated2") {
    // 量・質を★で選んでから「＋記録」で1件記録する。初期選択なし＝両方を選ばないと記録できない
    const starRow = (dim, label) => `<div class="crow"><span class="rlabel">${label}</span>`
      + [1, 2, 3, 4, 5].map(v => `<button class="cbtn" data-k="${c.key}" data-dim="${dim}" data-v="${v}">★${v}</button>`).join("") + `</div>`;
    // 射精など sex:true のカードは接触の有無を記録する（脳内物質の観点で重要）。既定は「なし」
    const sexRow = `<div class="crow"><span class="rlabel">接触</span>`
      + `<button class="cbtn sel" data-k="${c.key}" data-sex="0">なし</button>`
      + `<button class="cbtn" data-k="${c.key}" data-sex="1">あり</button></div>`;
    // memo:true のカードは視覚資料を自由入力できる（任意）
    const memoRow = `<div class="crow"><span class="rlabel">視覚資料</span>`
      + `<input class="memo" data-memo="${c.key}" type="text" placeholder="任意" autocapitalize="off" autocorrect="off"></div>`;
    // 食事など content/price/place/who:true のカードは内容・価格・場所（外食）・同席者を記録できる（いずれも任意）
    const contentRow = `<div class="crow"><span class="rlabel">内容</span>`
      + `<input class="memo" data-content="${c.key}" type="text" placeholder="食べたもの（任意）" autocapitalize="off" autocorrect="off"></div>`;
    const priceRow = `<div class="crow"><span class="rlabel">価格</span>`
      + `<input class="memo" data-price="${c.key}" type="number" inputmode="numeric" placeholder="任意"><span class="rsuffix">円</span></div>`;
    const placeRow = `<div class="crow"><span class="rlabel">場所</span>`
      + `<input class="memo" data-place="${c.key}" type="text" placeholder="外食先など（任意）" autocapitalize="off" autocorrect="off"></div>`;
    const whoRow = `<div class="crow"><span class="rlabel">誰と</span>`
      + `<input class="memo" data-who="${c.key}" type="text" placeholder="同席者（任意）" autocapitalize="off" autocorrect="off"></div>`;
    // トイレなど checks:true のカードは小・大などの区分を複数選択できる（いずれか必須）
    const checkRow = c.checks ? `<div class="crow"><span class="rlabel">区分</span>`
      + c.checks.map(ch => `<button class="cbtn" data-k="${c.key}" data-check="${ch.k}">${ch.label}</button>`).join("") + `</div>` : "";
    btns = checkRow + starRow("amount", "量") + starRow("quality", "質")
      + (c.sex ? sexRow : "") + (c.memo ? memoRow : "")
      + (c.content ? contentRow : "") + (c.price ? priceRow : "") + (c.place ? placeRow : "") + (c.who ? whoRow : "")
      + `<button class="cbtn rec" data-k="${c.key}" data-rec2="1">＋ 記録</button>`;
    const aAvg = avgRating(c.key, 30, "amount"), qAvg = avgRating(c.key, 30, "quality");
    stats = `直近7日 <b>${w}</b>${unit} ／ 30日 <b>${m}</b>${unit}${aAvg ? ` ／ 量平均 <b>★${aAvg.toFixed(1)}</b>` : ""}${qAvg ? ` ／ 質平均 <b>★${qAvg.toFixed(1)}</b>` : ""}`;
    retroExtra = (c.checks ? c.checks.map(ch => `<label class="rcheck"><input type="checkbox" data-retro-check="${ch.k}">${ch.label}</label>`).join("") : "")
      + `<select data-retro-amount><option value="" selected>量 未選択</option>${[5, 4, 3, 2, 1].map(v => `<option value="${v}">量★${v}</option>`).join("")}</select>`
      + `<select data-retro-quality><option value="" selected>質 未選択</option>${[5, 4, 3, 2, 1].map(v => `<option value="${v}">質★${v}</option>`).join("")}</select>`
      + (c.sex ? `<select data-retro-sex><option value="0" selected>接触なし</option><option value="1">接触あり</option></select>` : "")
      + (c.memo ? `<input class="memo" data-retro-memo type="text" placeholder="任意" autocapitalize="off" autocorrect="off">` : "")
      + (c.content ? `<input class="memo" data-retro-content type="text" placeholder="内容（任意）" autocapitalize="off" autocorrect="off">` : "")
      + (c.price ? `<input class="memo" data-retro-price type="number" inputmode="numeric" placeholder="価格（任意）">` : "")
      + (c.place ? `<input class="memo" data-retro-place type="text" placeholder="場所（任意）" autocapitalize="off" autocorrect="off">` : "")
      + (c.who ? `<input class="memo" data-retro-who type="text" placeholder="誰と（任意）" autocapitalize="off" autocorrect="off">` : "");
  } else if (c.type === "water") {
    // 飲み始め→（継続中）→飲み終わりで記録。量はデフォルト500mL・変更可
    const pend = getPending()[c.key];
    const totalToday = todayEvents(c.key).reduce((s, e) => s + (e.ml || 0), 0);
    const amt = pend ? pend.ml : 500;
    if (pend) { bigval = "継続中"; biglabel = "開始 " + fmtTime(pend.start); }
    else { bigval = totalToday; biglabel = "今日 mL"; }
    const mlRow = `<div class="crow"><span class="rlabel">量</span><input class="memo" data-water-ml="${c.key}" type="number" inputmode="numeric" value="${amt}" placeholder="500"><span class="rsuffix">mL</span></div>`;
    btns = mlRow + (pend
      ? `<button class="cbtn rec" data-water-finish="${c.key}">飲み終わり</button><button class="cbtn undo" data-water-cancel="${c.key}">中止</button>`
      : `<button class="cbtn rec" data-water-start="${c.key}">飲み始め</button>`);
    stats = `今日 <b>${todayEvents(c.key).length}</b>回 ／ <b>${totalToday}</b>mL ／ 直近7日 <b>${w}</b>回`;
    retroExtra = `<input class="memo" data-retro-ml type="number" inputmode="numeric" placeholder="mL">`;
  } else if (c.type === "dose") {
    // 服薬記録。用量はデフォルト（例:150mg）・変更可、理由は任意
    const du = c.doseUnit || "mg";
    const doseRow = `<div class="crow"><span class="rlabel">用量</span><input class="memo" data-dose="${c.key}" type="number" inputmode="numeric" value="${c.dose || ""}" placeholder="${c.dose || ""}"><span class="rsuffix">${du}</span></div>`;
    const reasonRow = `<div class="crow"><span class="rlabel">理由</span><input class="memo" data-reason="${c.key}" type="text" value="${esc(c.reasonDefault || "")}" placeholder="理由（任意）" autocapitalize="off" autocorrect="off"></div>`;
    btns = doseRow + reasonRow
      + `<button class="cbtn rec" data-dose-rec="${c.key}">＋ 記録</button>`;
    stats = `今日 <b>${todayEvents(c.key).length}</b>回 ／ 直近7日 <b>${w}</b>回 ／ 30日 <b>${m}</b>回`;
    retroExtra = `<input class="memo" data-retro-dose type="number" inputmode="numeric" placeholder="用量(${du})"><input class="memo" data-retro-reason type="text" placeholder="理由（任意）" autocapitalize="off" autocorrect="off">`;
  } else { // count型（喫煙・定期薬など）
    btns = `<button class="cbtn rec" data-k="${c.key}" data-rec="1"${c.confirm ? ' data-confirm="1"' : ''}>＋ 記録</button>`;
    if (c.perDay) biglabel = `／ ${c.perDay}${unit}（今日）`; // 定期薬は1日の目標回数を併記
    stats = c.sched
      ? `服用: ${c.sched} ／ 今日 <b>${today.length}</b>${unit} ／ 直近7日 <b>${w}</b>${unit}`
      : `直近7日 <b>${w}</b>${unit} ／ 30日 <b>${m}</b>${unit}`;
  }

  const evs = events(c.key).slice().reverse(); // 新しい順
  const histRows = evs.length
    ? evs.slice(0, 50).map(e => `<div class="hrow"><span class="htime">${mdhm(e.ts)}</span><span class="hsum">${esc(summ(e))}</span><span class="hact"><button class="cbtn hbtn" data-editid="${e.id}" data-k="${c.key}">編集</button><button class="cbtn hbtn" data-delid="${e.id}" data-k="${c.key}">削除</button></span></div>`).join("")
    : `<div class="hempty">まだ記録がありません</div>`;

  return `
    <div class="counter" data-key="${c.key}">
      <div class="chead"><span class="cemoji">${c.emoji}</span><span class="cname">${c.name}</span>${c.goal ? `<span class="cgoal">目標: ${c.goal}</span>` : ""}</div>
      <div class="cbig"><span class="cval">${bigval}</span><span class="cunit">${biglabel}</span></div>
      <div class="cbtns">${btns}${retro ? `<button class="cbtn undo" data-retro-open="${c.key}">遡って記録</button>` : ""}<button class="cbtn undo" data-hist-open="${c.key}">履歴</button></div>
      <div class="cstats">${stats}</div>
      <div class="hist" data-hist="${c.key}">${histRows}</div>
      ${dayGraph(c)}
      <div class="clast">${last ? "最終記録 " + fmtTime(last.ts) + (last.rating ? `（★${last.rating}）` : "") + (last.amount ? `（量★${last.amount}・質★${last.quality || "-"}${last.sex != null ? (last.sex ? "・接触あり" : "・接触なし") : ""}）${(last.small || last.large) ? " " + [last.small ? "小" : "", last.large ? "大" : ""].filter(Boolean).join("・") : ""}` : "") + (last.mood ? `（${last.mood}/5）` : "") + (last.content ? ` 内容: ${esc(last.content)}` : "") + (last.price != null ? ` ${last.price}円` : "") + (last.place ? ` 場所: ${esc(last.place)}` : "") + (last.who ? ` 誰と: ${esc(last.who)}` : "") + (last.memo ? ` 視覚資料: ${esc(last.memo)}` : "") + (last.ml != null ? ` ${last.ml}mL` : "") + (last.mg != null ? ` ${last.mg}mg` : "") + (last.reason ? ` ${esc(last.reason)}` : "") : "本日の記録なし"}</div>
      ${retro ? `<div class="retro" data-retro="${c.key}"><label class="retro-label">${c.type === "water" ? "過去の時刻で飲み始め（継続中）／飲み終わり（記録）" : "過去の日時を指定して記録"}</label><div class="rrow"><input type="datetime-local" data-retro-dt>${retroExtra}${c.type === "water"
        ? `<button class="cbtn rec" data-wstart="${c.key}">飲み始め</button><button class="cbtn rec" data-wfinish="${c.key}">飲み終わり</button><button class="cbtn rec" data-retro-submit="${c.key}" style="display:none">更新</button>`
        : `<button class="cbtn rec" data-retro-submit="${c.key}">記録</button>`}<button class="cbtn undo" data-canceledit="${c.key}" style="display:none">キャンセル</button></div></div>` : ""}
    </div>`;
}
// 編集モード: 遡って記録フォームを対象記録の値で埋め、送信を「更新」に切り替える
function fillEditForm(card, e) {
  const p = card.querySelector(".retro");
  if (!p) return;
  p.classList.add("open");
  const set = (sel, val) => { const el = p.querySelector(sel); if (el) el.value = val; };
  const dt = p.querySelector("[data-retro-dt]");
  if (dt) { const d = new Date(e.ts); d.setMinutes(d.getMinutes() - d.getTimezoneOffset()); dt.value = d.toISOString().slice(0, 16); }
  if (e.mood != null) set("[data-retro-moodsel]", String(e.mood));
  if (e.amount != null) set("[data-retro-amount]", String(e.amount));
  if (e.quality != null) set("[data-retro-quality]", String(e.quality));
  set("[data-retro-sex]", e.sex ? "1" : "0");
  set("[data-retro-memo]", e.memo || "");
  set("[data-retro-content]", e.content || "");
  set("[data-retro-price]", e.price != null ? String(e.price) : "");
  set("[data-retro-place]", e.place || "");
  set("[data-retro-who]", e.who || "");
  set("[data-retro-ml]", e.ml != null ? String(e.ml) : "");
  set("[data-retro-dose]", e.mg != null ? String(e.mg) : "");
  set("[data-retro-reason]", e.reason || "");
  p.querySelectorAll("[data-retro-check]").forEach(ch => ch.checked = !!e[ch.dataset.retroCheck]);
  // 水の新規用ボタン（飲み始め/飲み終わり）は編集時は隠し、更新ボタンを出す
  p.querySelectorAll("[data-wstart],[data-wfinish]").forEach(el => el.style.display = "none");
  const submit = p.querySelector("[data-retro-submit]"); if (submit) { submit.textContent = "更新"; submit.style.display = ""; }
  const lbl = p.querySelector(".retro-label"); if (lbl) lbl.textContent = "この記録を修正（日時も変更可）";
  const cancel = p.querySelector("[data-canceledit]"); if (cancel) cancel.style.display = "";
}
function render() {
  box.innerHTML = COUNTERS.map(cardHtml).join("");
  if (editing) { // 再描画後に編集モードを復元
    const e = events(editing.key).find(ev => ev.id === editing.id);
    const card = box.querySelector(`.counter[data-key="${editing.key}"]`);
    if (e && card) fillEditForm(card, e); else editing = null;
  }
}

box.addEventListener("click", e => {
  const btn = e.target.closest(".cbtn");
  if (!btn) return;
  if (btn.dataset.retroOpen) {
    if (editing) { editing = null; render(); } // 通常の遡って記録に戻す
    const p = box.querySelector(`.retro[data-retro="${btn.dataset.retroOpen}"]`);
    if (p) { p.classList.toggle("open"); const dt = p.querySelector("[data-retro-dt]"); if (p.classList.contains("open") && dt && !dt.value) dt.value = nowLocalInput(); }
    return;
  }
  if (btn.dataset.histOpen) { // 履歴パネルの開閉
    const p = box.querySelector(`.hist[data-hist="${btn.dataset.histOpen}"]`);
    if (p) p.classList.toggle("open");
    return;
  }
  if (btn.dataset.editid) { // 記録の編集を開始（フォームに値を流し込む）
    editing = { key: btn.dataset.k, id: btn.dataset.editid };
    render();
    const rp = box.querySelector(`.counter[data-key="${btn.dataset.k}"] .retro`);
    if (rp) rp.scrollIntoView({ block: "nearest" });
    return;
  }
  if (btn.dataset.delid) { // 記録の削除
    if (confirm("この記録を削除しますか？")) deleteEvent(btn.dataset.k, btn.dataset.delid);
    return;
  }
  if (btn.dataset.canceledit) { editing = null; render(); return; }
  if (btn.dataset.retroSubmit) {
    const key = btn.dataset.retroSubmit, p = box.querySelector(`.retro[data-retro="${key}"]`);
    const dtEl = p.querySelector("[data-retro-dt]");
    if (!dtEl.value) { alert("日時を入力してください。"); return; }
    const ts = new Date(dtEl.value).toISOString();
    const moodSel = p.querySelector("[data-retro-moodsel]");
    const rSel = p.querySelector("[data-retro-rating]");
    const mlSel = p.querySelector("[data-retro-ml]"), doseSel = p.querySelector("[data-retro-dose]");
    const aSel = p.querySelector("[data-retro-amount]"), qSel = p.querySelector("[data-retro-quality]");
    let extra = {};
    if (moodSel) {
      if (!moodSel.value) { alert("気分を選んでください。"); return; }
      extra = { mood: Number(moodSel.value) };
    } else if (rSel) extra = { rating: Number(rSel.value) };
    else if (mlSel) {
      if (mlSel.value.trim() === "" || isNaN(Number(mlSel.value))) { alert("mLを入力してください。"); return; }
      extra = { ml: Number(mlSel.value) };
    } else if (doseSel) {
      if (doseSel.value.trim() === "" || isNaN(Number(doseSel.value))) { alert("用量を入力してください。"); return; }
      extra = { mg: Number(doseSel.value) };
      const rEl = p.querySelector("[data-retro-reason]");
      if (rEl && rEl.value.trim()) extra.reason = rEl.value.trim();
    }
    if (aSel && qSel) {
      if (!aSel.value || !qSel.value) { alert("量と質を選んでください。"); return; }
      extra = { amount: Number(aSel.value), quality: Number(qSel.value) };
      const retroChecks = p.querySelectorAll("[data-retro-check]");
      if (retroChecks.length) { // 区分（小・大）はいずれか必須
        if (![...retroChecks].some(ch => ch.checked)) { alert("小・大のいずれかを選んでください。"); return; }
        retroChecks.forEach(ch => extra[ch.dataset.retroCheck] = ch.checked);
      }
      const sexSel = p.querySelector("[data-retro-sex]");
      if (sexSel) extra.sex = sexSel.value === "1"; // 既定「なし」
      const memoEl = p.querySelector("[data-retro-memo]");
      if (memoEl && memoEl.value.trim()) extra.memo = memoEl.value.trim();
      const contentEl = p.querySelector("[data-retro-content]");
      if (contentEl && contentEl.value.trim()) extra.content = contentEl.value.trim();
      const priceEl = p.querySelector("[data-retro-price]");
      if (priceEl && priceEl.value.trim() !== "" && !isNaN(Number(priceEl.value))) extra.price = Number(priceEl.value);
      const placeEl = p.querySelector("[data-retro-place]");
      if (placeEl && placeEl.value.trim()) extra.place = placeEl.value.trim();
      const whoEl = p.querySelector("[data-retro-who]");
      if (whoEl && whoEl.value.trim()) extra.who = whoEl.value.trim();
    }
    const hasChecks = !!p.querySelector("[data-retro-check]");
    if (editing && editing.key === key) { updateEvent(key, editing.id, extra, ts); editing = null; } // 編集は単一レコードを更新（水の新規は data-wstart/wfinish で処理）
    else if (hasChecks) { recordToilet(key, extra.amount, extra.quality, !!extra.small, !!extra.large, ts); } // 新規は大→小を副次追加
    else record(key, extra, ts);
    return;
  }
  const key = btn.dataset.k;
  if (btn.dataset.rec) {
    if (!btn.dataset.confirm) return record(key); // 確認不要
    if (btn.dataset.armed === "1") return record(key); // 2回目で記録（render()でボタンは元に戻る）
    // 1回目: 確認状態にする（3秒以内に再タップ／それ以外は自動で戻る）。誤タップ防止
    btn.dataset.armed = "1";
    btn.textContent = "もう1回タップで記録";
    btn.classList.add("arming");
    clearTimeout(btn._armTimer);
    btn._armTimer = setTimeout(() => { btn.dataset.armed = ""; btn.textContent = "＋ 記録"; btn.classList.remove("arming"); }, 3000);
    return;
  }
  if (btn.dataset.dim || "sex" in btn.dataset) { // 量・質の★／接触なし・あり の選択トグル（この時点では記録しない）
    btn.parentElement.querySelectorAll(".cbtn").forEach(b => b.classList.remove("sel"));
    btn.classList.add("sel");
    return;
  }
  if ("check" in btn.dataset) { // 小・大などの区分は独立トグル（複数選択可）
    btn.classList.toggle("sel");
    return;
  }
  if (btn.dataset.rec2) {
    const card = btn.closest(".counter");
    const a = card.querySelector('.sel[data-dim="amount"]'), q = card.querySelector('.sel[data-dim="quality"]');
    if (!a || !q) { alert("量と質を選んでください。"); return; }
    const amount = Number(a.dataset.v), quality = Number(q.dataset.v);
    const checkBtns = card.querySelectorAll("[data-check]");
    if (checkBtns.length) { // 区分（小・大）はいずれか必須。大なら小を副次追加
      const small = !!card.querySelector('.sel[data-check="small"]');
      const large = !!card.querySelector('.sel[data-check="large"]');
      if (!small && !large) { alert("小・大のいずれかを選んでください。"); return; }
      recordToilet(key, amount, quality, small, large);
      return;
    }
    const extra = { amount, quality };
    const sx = card.querySelector(".sel[data-sex]"); // 接触は既定「なし」が選択済み
    if (sx) extra.sex = sx.dataset.sex === "1";
    const memoEl = card.querySelector("[data-memo]");
    if (memoEl && memoEl.value.trim()) extra.memo = memoEl.value.trim();
    const contentEl = card.querySelector("[data-content]");
    if (contentEl && contentEl.value.trim()) extra.content = contentEl.value.trim();
    const priceEl = card.querySelector("[data-price]");
    if (priceEl && priceEl.value.trim() !== "" && !isNaN(Number(priceEl.value))) extra.price = Number(priceEl.value);
    const placeEl = card.querySelector("[data-place]");
    if (placeEl && placeEl.value.trim()) extra.place = placeEl.value.trim();
    const whoEl = card.querySelector("[data-who]");
    if (whoEl && whoEl.value.trim()) extra.who = whoEl.value.trim();
    return record(key, extra);
  }
  if (btn.dataset.moodsel) { // 気分の選択トグル（この時点では記録しない）
    const card = btn.closest(".counter");
    card.querySelectorAll("[data-moodsel]").forEach(b => b.classList.remove("sel"));
    btn.classList.add("sel");
    return;
  }
  if (btn.dataset.recmood) {
    const card = btn.closest(".counter");
    const m = card.querySelector(".sel[data-moodsel]");
    if (!m) { alert("気分を選んでください。"); return; }
    return record(key, { mood: Number(m.dataset.moodsel) });
  }
  if (btn.dataset.rating) return record(key, { rating: Number(btn.dataset.rating) });
  // 水: 飲み始め→継続中→飲み終わり
  if (btn.dataset.waterStart) {
    const k = btn.dataset.waterStart, mlEl = btn.closest(".counter").querySelector("[data-water-ml]");
    let ml = mlEl && mlEl.value.trim() !== "" ? Number(mlEl.value) : 500;
    if (!(ml > 0)) ml = 500;
    setPending(k, { start: new Date().toISOString(), ml });
    return render();
  }
  if (btn.dataset.waterFinish) {
    const k = btn.dataset.waterFinish, pend = getPending()[k];
    const mlEl = btn.closest(".counter").querySelector("[data-water-ml]");
    let ml = mlEl && mlEl.value.trim() !== "" ? Number(mlEl.value) : (pend ? pend.ml : 500);
    if (!(ml > 0)) ml = 500;
    setPending(k, null);
    return record(k, pend ? { ml, start: pend.start } : { ml }); // 記録時刻=飲み終わり
  }
  if (btn.dataset.waterCancel) { setPending(btn.dataset.waterCancel, null); return render(); }
  // 水: 遡って飲み始め（過去時刻でpending）／遡って飲み終わり（過去時刻で記録）
  if (btn.dataset.wstart || btn.dataset.wfinish) {
    const k = btn.dataset.wstart || btn.dataset.wfinish, rp = box.querySelector(`.retro[data-retro="${k}"]`);
    const dtEl = rp.querySelector("[data-retro-dt]"), mlEl = rp.querySelector("[data-retro-ml]");
    if (!dtEl.value) { alert("日時を入力してください。"); return; }
    if (mlEl.value.trim() === "" || isNaN(Number(mlEl.value))) { alert("mLを入力してください。"); return; }
    const ts = new Date(dtEl.value).toISOString(), ml = Number(mlEl.value);
    if (btn.dataset.wstart) { setPending(k, { start: ts, ml }); return render(); }
    const pend = getPending()[k]; setPending(k, null); // 飲み終わり: 継続中があれば開始を引き継ぐ
    return record(k, pend ? { ml, start: pend.start } : { ml }, ts);
  }
  // 服薬: 用量(mg)＋理由を即記録
  if (btn.dataset.doseRec) {
    const k = btn.dataset.doseRec, card = btn.closest(".counter");
    const doseEl = card.querySelector("[data-dose]"), reasonEl = card.querySelector("[data-reason]");
    if (!doseEl || doseEl.value.trim() === "" || isNaN(Number(doseEl.value))) { alert("用量を入力してください。"); return; }
    const extra = { mg: Number(doseEl.value) };
    if (reasonEl && reasonEl.value.trim()) extra.reason = reasonEl.value.trim();
    return record(k, extra);
  }
});

/* ---------- GitHub 同期 ---------- */
function getCfg() { try { return JSON.parse(localStorage.getItem(CFG_KEY)) || {}; } catch (e) { return {}; } }
function setCfg(c) { localStorage.setItem(CFG_KEY, JSON.stringify(c)); }
function cfgOk(c) { return c && c.owner && c.repo && c.path && c.token; }
function status(m) { statusEl.textContent = m; }
function hhmm() { const d = new Date(); return String(d.getHours()).padStart(2, "0") + ":" + String(d.getMinutes()).padStart(2, "0"); }
const b64enc = s => btoa(unescape(encodeURIComponent(s)));
const b64dec = s => decodeURIComponent(escape(atob((s || "").replace(/\n/g, ""))));

async function ghGet(c) {
  const url = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${c.path}?ref=${c.branch || "main"}`;
  const r = await fetch(url, { headers: { Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json" } });
  if (r.status === 404) return { data: null, sha: null };
  if (!r.ok) throw new Error("GET " + r.status);
  const j = await r.json();
  return { data: JSON.parse(b64dec(j.content)), sha: j.sha };
}
async function ghPut(c, obj, sha) {
  const url = `https://api.github.com/repos/${c.owner}/${c.repo}/contents/${c.path}`;
  const body = { message: "counters " + new Date().toISOString(), content: b64enc(JSON.stringify(obj)), branch: c.branch || "main" };
  if (sha) body.sha = sha;
  const r = await fetch(url, { method: "PUT", headers: { Authorization: "Bearer " + c.token, Accept: "application/vnd.github+json", "Content-Type": "application/json" }, body: JSON.stringify(body) });
  if (!r.ok) throw new Error("PUT " + r.status);
  return (await r.json()).content.sha;
}
function merge(local, remote) {
  remote = remote || { events: {}, deleted: [] };
  const del = new Set([...(local.deleted || []), ...(remote.deleted || [])]);
  const keys = new Set([...Object.keys(local.events || {}), ...Object.keys(remote.events || {})]);
  const events = {};
  keys.forEach(k => {
    const byId = new Map();
    // 同じidが両側にある場合は mt（更新時刻）が新しい方を採用し、編集が古い版に負けないようにする
    [...(local.events[k] || []), ...(remote.events[k] || [])].forEach(e => {
      if (!e.id) e.id = newId();
      if (del.has(e.id)) return;
      const prev = byId.get(e.id);
      if (!prev || (e.mt || 0) >= (prev.mt || 0)) byId.set(e.id, e);
    });
    events[k] = [...byId.values()].sort((a, b) => a.ts.localeCompare(b.ts));
  });
  return { events, deleted: [...del] };
}
async function syncOnce(c) {
  const remote = await ghGet(c);
  const merged = merge({ events: all(), deleted: deleted() }, remote.data);
  save(merged.events); saveDeleted(merged.deleted);
  await ghPut(c, merged, remote.sha);
}
let syncing = false, syncTimer = null;
async function sync() {
  const c = getCfg();
  if (!cfgOk(c)) { status("未設定"); return; }
  if (syncing) return;
  syncing = true; status("同期中…");
  try {
    try { await syncOnce(c); }
    catch (e) { if (/\b409\b/.test(e.message)) { await syncOnce(c); } else { throw e; } } // 競合時は最新SHAで1回再試行
    render(); status("同期完了 " + hhmm());
  } catch (e) { status("同期失敗: " + e.message); } finally { syncing = false; }
}
function scheduleSync() { if (!cfgOk(getCfg())) return; clearTimeout(syncTimer); syncTimer = setTimeout(sync, 2500); }

function fillCfg() {
  const c = getCfg();
  document.getElementById("cfg-owner").value = c.owner || "";
  document.getElementById("cfg-repo").value = c.repo || "";
  document.getElementById("cfg-path").value = c.path || "counters.json";
  document.getElementById("cfg-branch").value = c.branch || "main";
  document.getElementById("cfg-token").value = c.token || "";
}
document.getElementById("gh-config").addEventListener("click", () => { fillCfg(); panel.classList.toggle("open"); });
document.getElementById("cfg-save").addEventListener("click", () => {
  setCfg({
    owner: document.getElementById("cfg-owner").value.trim(),
    repo: document.getElementById("cfg-repo").value.trim(),
    path: document.getElementById("cfg-path").value.trim() || "counters.json",
    branch: document.getElementById("cfg-branch").value.trim() || "main",
    token: document.getElementById("cfg-token").value.trim(),
  });
  panel.classList.remove("open"); sync();
});
document.getElementById("cfg-clear").addEventListener("click", () => { localStorage.removeItem(CFG_KEY); fillCfg(); status("設定を削除しました"); });
document.getElementById("gh-sync").addEventListener("click", sync);

render();
if (cfgOk(getCfg())) { status("設定済み"); sync(); } else { status("未同期（この端末はまだ設定していません）"); }
</script>
