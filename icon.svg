<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Shiden LifeLogger ホーム画面アイコン（icon-192.png / icon-512.png）のマスターSVG。
       紫電Expense の docs/icon.svg を基に、雷・背景・グラデーションはそのまま流用し、
       背後の「領収書」を「人型（身体）を載せた白カード」に差し替えたもの。
       PNGを再生成する場合はこのSVGを512px/192pxでラスタライズする。 -->
  <defs>
    <radialGradient id="bgr" cx="0.5" cy="0.3" r="1.0">
      <stop offset="0" stop-color="#4d357e"/>
      <stop offset="0.55" stop-color="#35245c"/>
      <stop offset="1" stop-color="#1d1136"/>
    </radialGradient>
    <linearGradient id="bolt" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fde047"/><stop offset="0.5" stop-color="#f59e0b"/><stop offset="1" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="edge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#a855f7"/><stop offset="1" stop-color="#6d28d9"/>
    </linearGradient>
    <filter id="sh" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="10" stdDeviation="18" flood-color="#7c3aed" flood-opacity="0.6"/>
    </filter>
  </defs>
  <rect width="512" height="512" fill="url(#bgr)"/>
  <!-- 身体カード（領収書と同じ傾きの白カードに人型を載せる） -->
  <g transform="rotate(-23.4 256 256)">
    <rect x="136" y="30" width="254" height="452" rx="26" fill="#f2f2f0"/>
    <circle cx="256" cy="112" r="37" fill="#7c3aed"/>
    <g fill="none" stroke="#7c3aed" stroke-width="36" stroke-linecap="round" stroke-linejoin="round">
      <path d="M256 164 L256 300"/>
      <path d="M256 206 L198 264"/>
      <path d="M256 206 L314 264"/>
      <path d="M256 300 L212 392"/>
      <path d="M256 300 L300 392"/>
    </g>
  </g>
  <!-- 雷（紫電Expense と完全に同一） -->
  <g transform="translate(48 56) scale(0.78)" filter="url(#sh)">
    <path d="M296 36 L138 296 L238 296 L198 476 L396 208 L286 208 L352 36 Z" fill="none" stroke="#f5f2fa" stroke-width="72" stroke-linejoin="round"/>
    <path d="M296 36 L138 296 L238 296 L198 476 L396 208 L286 208 L352 36 Z" fill="url(#bolt)" stroke="url(#edge)" stroke-width="40" stroke-linejoin="round"/>
  </g>
</svg>
